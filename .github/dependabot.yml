version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      include: scope
    groups:
      charmbracelet:
        patterns:
          - "github.com/charmbracelet/*"
        update-types:
          - minor
          - patch
      golangci-lint:
        patterns:
          - "github.com/golangci/*"
        update-types:
          - minor
          - patch
      go-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch
