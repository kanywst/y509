name: Demo

on:
  push:
    branches: [main]
    paths:
      - 'demo.tape'
      - 'cmd/**'
      - 'internal/**'
      - 'pkg/**'
      - 'scripts/gen_demo_certs.go'
      - '.github/workflows/demo.yml'

permissions:
  contents: write

concurrency:
  group: demo-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install ttyd
        run: |
          curl -L -o /tmp/ttyd https://github.com/tsl0922/ttyd/releases/latest/download/ttyd.x86_64
          chmod +x /tmp/ttyd
          sudo mv /tmp/ttyd /usr/local/bin/ttyd

      - name: Install vhs
        run: go install github.com/charmbracelet/vhs@latest

      - name: Render demo.gif
        run: vhs demo.tape

      - name: Commit and push if demo.gif changed
        run: |
          if git diff --quiet -- demo.gif; then
            echo "demo.gif unchanged, nothing to commit"
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add demo.gif
          git commit -m "chore(demo): refresh demo.gif"
          git push
